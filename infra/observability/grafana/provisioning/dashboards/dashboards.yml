# Load dashboards automatically from the mounted dashboard directory.
apiVersion: 1
providers:
  - name: RootsMarket
    orgId: 1
    folder: RootsMarket
    folderUid: rootsmarket
    type: file

    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30

    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false