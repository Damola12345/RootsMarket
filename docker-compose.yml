
x-common-env: &common-env
  NODE_ENV: development
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: 
  POSTGRES_USER: 
  POSTGRES_PASSWORD: 
  REDIS_URL: redis://redis:6379
  CACHE_TTL_SECONDS: 60
  RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672

services:
  postgres:
    image: postgres:16
    container_name: rootsmarket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: 
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./infra/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - rootsmarket-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rootsmarket"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rootsmarket-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - rootsmarket-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rootsmarket-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: 
      RABBITMQ_DEFAULT_PASS: 
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rootsmarket-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./services/user-service
    container_name: rootsmarket-user-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      <<: *common-env
      PORT: 3001
      SERVICE_NAME: user-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rootsmarket-net

  product-service:
    build:
      context: ./services/product-service
    container_name: rootsmarket-product-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      <<: *common-env
      PORT: 3002
      SERVICE_NAME: product-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rootsmarket-net

  order-service:
    build:
      context: ./services/order-service
    container_name: rootsmarket-order-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      <<: *common-env
      PORT: 3003
      SERVICE_NAME: order-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rootsmarket-net

  payment-service:
    build:
      context: ./services/payment-service
    container_name: rootsmarket-payment-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      <<: *common-env
      PORT: 3004
      SERVICE_NAME: payment-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rootsmarket-net

  notification-service:
    build:
      context: ./services/notification-service
    container_name: rootsmarket-notification-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      <<: *common-env
      PORT: 3005
      SERVICE_NAME: notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - rootsmarket-net

networks:
  rootsmarket-net:
    driver: bridge

volumes:
  pgdata:
  rabbitmq_data: