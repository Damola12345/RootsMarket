# Shared environment variables reused by all services
x-common-env: &common-env
  NODE_ENV: development
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: 
  POSTGRES_USER: 
  POSTGRES_PASSWORD: 
  REDIS_URL: redis://redis:6379
  CACHE_TTL_SECONDS: 60
  RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
  CORS_ORIGIN: http://localhost:3000

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: rootsmarket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: 
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./infra/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - rootsmarket-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rootsmarket"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: rootsmarket-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - rootsmarket-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rootsmarket-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: 
      RABBITMQ_DEFAULT_PASS: 
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rootsmarket-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./services/user-service
    container_name: rootsmarket-user-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      <<: *common-env
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rootsmarket-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  product-service:
    build:
      context: ./services/product-service
    container_name: rootsmarket-product-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      <<: *common-env
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rootsmarket-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./services/order-service
    container_name: rootsmarket-order-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      <<: *common-env
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rootsmarket-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: ./services/payment-service
    container_name: rootsmarket-payment-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      <<: *common-env
      PORT: 3004
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rootsmarket-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3004/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ./services/notification-service
    container_name: rootsmarket-notification-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      <<: *common-env
      PORT: 3005
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - rootsmarket-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3005/health"]
      interval: 30s
      timeout: 5s
      retries: 5

 # React Frontend served by Nginx
  frontend:
    build:
      context: ./frontend
      args:
        VITE_USER_SERVICE_URL: http://localhost:3001
        VITE_PRODUCT_SERVICE_URL: http://localhost:3002
        VITE_ORDER_SERVICE_URL: http://localhost:3003
        VITE_PAYMENT_SERVICE_URL: http://localhost:3004
        VITE_NOTIFICATION_SERVICE_URL: http://localhost:3005
    container_name: rootsmarket-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - rootsmarket-net

networks:
  rootsmarket-net:
    driver: bridge

volumes:
  pgdata:
  rabbitmq_data: